<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional IQ Test v2.0</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #0f172a, #1e1b4b); color: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; margin: 0; }
        .card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; max-width: 550px; padding: 30px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); text-align: center; }
        h2 { color: #38bdf8; margin-bottom: 20px; font-size: 24px; }
        h3 { font-size: 20px; line-height: 1.5; margin-bottom: 25px; }
        button { background: linear-gradient(90deg, #3b82f6, #8b5cf6); color: white; border: none; padding: 14px 28px; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: bold; margin: 10px; width: 100%; transition: all 0.3s ease; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(139, 92, 246, 0.5); }
        .lang-btn { width: auto; display: inline-block; min-width: 150px; }
        .hidden { display: none; }
        .option-btn { background: rgba(255, 255, 255, 0.05); color: #e2e8f0; border: 1px solid rgba(255,255,255,0.1); margin: 12px 0; text-align: left; padding: 15px 20px; }
        .option-btn:hover { background: rgba(255, 255, 255, 0.15); border-color: #38bdf8; }
        #timer-box { font-size: 18px; color: #f43f5e; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .progress-bar { width: 100%; background: rgba(255,255,255,0.1); height: 8px; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { background: #38bdf8; height: 100%; width: 0%; transition: width 0.3s ease; }
        .loader { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #38bdf8; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 30px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .result-score { font-size: 48px; font-weight: bold; color: #10b981; margin: 20px 0; text-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .tahlil-text { text-align: left; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; font-size: 15px; line-height: 1.6; color: #cbd5e1; }
    </style>
</head>
<body>

<div class="card">
    <!-- 1. TIL TANLASH -->
    <div id="lang-screen">
        <h2>IQ TEST v2.0</h2>
        <p style="color: #94a3b8;">Tilingizni tanlang / Выберите язык</p>
        <button class="lang-btn" onclick="startTest('uz')">O'zbekcha 🇺🇿</button>
        <button class="lang-btn" onclick="startTest('ru')">Русский 🇷🇺</button>
    </div>

    <!-- 2. TEST JORAYONI -->
    <div id="quiz-screen" class="hidden">
        <div id="timer-box">⏱️ <span id="timer-num">30</span> s</div>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        <h3 id="question-text">Savol yuklanmoqda...</h3>
        <div id="options-container"></div>
    </div>

    <!-- 3. LOADING -->
    <div id="loading-screen" class="hidden">
        <h2 id="loading-title">Natijalar hisoblanmoqda...</h2>
        <div class="loader"></div>
        <p style="color: #94a3b8;" id="loading-desc">Algoritm sizning mantiqiy fikrlashingiz va tezligingizni tahlil qilmoqda. Iltimos kuting...</p>
    </div>

    <!-- 4. NATIJA -->
    <div id="result-screen" class="hidden">
        <h2 id="result-head">Test Yakunlandi!</h2>
        <div class="result-score" id="result-score">IQ 110</div>
        <div class="tahlil-text" id="result-tahlil"></div>
        <button style="margin-top: 25px;" onclick="location.reload()">Qayta topshirish / Сначала</button>
    </div>
</div>

<script>
    const questions = {
        uz: [
            { q: "1. Daraxtda 5 ta qush o'tirgandi. Ovchi bittasini otdi. Daraxtda nechta qush qoldi?", o: ["4 ta", "1 ta", "Hech qancha (qolganlari uchib ketdi)", "5 ta"], a: 2 },
            { q: "2. Marafonda 2-o'rindagi yuguruvchini quvib o'tsangiz, nechanchi bo'lasiz?", o: ["1-o'rin", "2-o'rin", "3-o'rin", "Oxirgi"], a: 1 },
            { q: "3. Dekabr, Yanvar va Fevral oylarida necha kun bor?", o: ["90 kun", "89 kun", "Hamma oyda 28 kun bor", "91 (yoki kabisa yilida 92) kun"], a: 3 },
            { q: "4. Agar kecha ertaga bo'lganida edi, bugun payshanba bo'lardi. Bugun qaysi kun?", o: ["Seshanba", "Chorshanba", "Juma", "Shanba"], a: 3 },
            { q: "5. Otaning 5 ta o'g'li bor. Har bir o'g'ilning bittadan opasi bor. Otaning jami nechta farzandi bor?", o: ["10 ta", "6 ta", "5 ta", "9 ta"], a: 1 },
            { q: "6. Qaysi so'z qavs ichidagi so'z mantiqiga mos keladi: Tikuvchi (Igna) Haydovchi (?)", o: ["Mashina", "Rul", "Benzin", "Yo'l"], a: 1 },
            { q: "7. Ketma-ketlikni davom ettiring: 2, 4, 8, 16, 32, ?", o: ["40", "64", "48", "50"], a: 1 },
            { q: "8. Qorong'i xonaga kirdingiz. Sizda bitta gugurt, kerosin lampa, sham va gaz plitasi bor. Birinchi bo'lib nimani yoqasiz?", o: ["Shamni", "Gugurtni", "Gazni", "Lampani"], a: 1 },
            { q: "9. 3 ta mushuk 3 daqiqada 3 ta sichqonni tutsa, 100 ta mushuk 100 ta sichqonni necha daqiqada tutadi?", o: ["100 daqiqa", "30 daqiqa", "3 daqiqa", "1 daqiqa"], a: 2 },
            { q: "10. Shaharning bir chetidan ikkinchi chetiga qarab poezd ketmoqda. Shamol sharqdan g'arbga esyapti. Elektrovozning tutuni qaysi tomonga qarab ketadi?", o: ["G'arbga", "Sharqqa", "Tepaga", "Elektrovozning tutuni bo'lmaydi"], a: 3 },
            { q: "11. 1 dan 100 gacha bo'lgan sonlar ichida nechta '9' raqami qatnashgan?", o: ["10 ta", "19 ta", "20 ta", "11 ta"], a: 2 },
            { q: "12. Aka singlisidan 4 yosh katta. 5 yildan keyin aka singlisidan necha yosh katta bo'ladi?", o: ["9 yosh", "4 yosh", "5 yosh", "O'zgaradi"], a: 1 },
            { q: "13. Quyidagilardan qaysi biri ortiqcha: Olma, Nok, Pomidor, Banan, Shaftoli?", o: ["Banan", "Pomidor", "Nok", "Ortiqchasi yo'q, hammasi meva"], a: 3 },
            { q: "14. Stol ustida 3 ta olma bor edi. Siz 2 tasini oldingiz. Sizda nechta olma qoldi?", o: ["1 ta", "2 ta", "3 ta", "0 ta"], a: 1 },
            { q: "15. Agar 5ta mashina 5 daqiqada 5ta detal yaratsa, 100ta mashina 100ta detalni necha daqiqada yaratadi?", o: ["100 daqiqa", "20 daqiqa", "5 daqiqa", "50 daqiqa"], a: 2 },
            { q: "16. Bo'sh qopga nechta kartoshka solish mumkin?", o: ["Qop to'lguncha", "Faqat 1 ta (keyin qop bo'sh bo'lmaydi)", "Hech qancha", "Qop hajmiga qarab"], a: 1 },
            { q: "17. Dengiz o'rtasidagi tosh qanday bo'ladi?", o: ["Og'ir", "Ho'l", "Silliq", "Qora"], a: 1 },
            { q: "18. Qaysi og'irroq: 1 kg temirmi yoki 1 kg paxta?", o: ["Temir", "Paxta", "Ikkala vazn teng", "Sharoitga qarab"], a: 2 },
            { q: "19. Ikki kishi shaxmat o'ynayapti. Jami 5 partiya o'ynashdi va har biri 3 tadan g'alaba qozondi. Bu qanday sodir bo'ldi?", o: ["Durang bo'lgan", "Ular o'zaro o'ynamagan, boshqa raqiblar bilan o'ynagan", "Xato yozilgan", "Hakam yordam bergan"], a: 1 },
            { q: "20. Agar soat 12:00 da yomg'ir yog'ayotgan bo'lsa, 72 soatdan keyin oftob chiqishi mumkinmi?", o: ["Ha", "Yo'q, chunki 72 soatdan keyin yana tun (yarim kechasi) bo'ladi", "Ob-havoga bog'liq", "Mumkin"], a: 1 }
        ],
        ru: [
            { q: "1. На дереве сидели 5 птиц. Охотник подстрелил одну. Сколько птиц осталось?", o: ["4", "1", "Ни одной (остальные улетели)", "5"], a: 2 },
            { q: "2. Вы обогнали бегуна, идущего вторым. Какую позицию вы теперь занимаете?", o: ["Первую", "Вторую", "Третью", "Последнюю"], a: 1 },
            { q: "3. Сколько дней в Декабре, Январе и Феврале суммарно?", o: ["90 дней", "89 дней", "Во всех месяцах по 28 дней", "91 (или 92 в високосный)"], a: 3 },
            { q: "4. Если бы вчерашний день был завтрашним, то сегодня был бы четверг. Какой сегодня день?", o: ["Вторник", "Среда", "Пятница", "Суббота"], a: 3 },
            { q: "5. У отца 5 сыновей. У каждого сына есть одна сестра. Сколько всего детей у отца?", o: ["10", "6", "5", "9"], a: 1 },
            { q: "6. Какое слово подходит по логике: Портной (Игла) Водитель (?)", o: ["Машина", "Руль", "Бензин", "Дорога"], a: 1 },
            { q: "7. Продолжите ряд: 2, 4, 8, 16, 32, ?", o: ["40", "64", "48", "50"], a: 1 },

            { q: "9. Если 3 кошки ловят 3 мышей за 3 минуты, за сколько минут 100 кошек поймают 100 мышей?", o: ["100 минут", "30 минут", "3 минуты", "1 минута"], a: 2 },
            { q: "10. Поезд едет с востока на запад. Ветер дует с востока на запад. В какую сторону идет дым из электровоза?", o: ["На запад", "На восток", "Вверх", "У электровоза нет дыма"], a: 3 },
            { q: "11. Сколько раз цифра '9' встречается в числах от 1 до 100?", o: ["10", "19", "20", "11"], a: 2 },
            { q: "12. Брат старше сестры на 4 года. На сколько лет он будет старше её через 5 лет?", o: ["На 9 лет", "На 4 года", "На 5 лет", "Изменится"], a: 1 },
            { q: "13. Что здесь лишнее: Яблоко, Груша, Помидор, Банан, Персик?", o: ["Банан", "Помидор", "Груша", "Лишнего нет, все фрукты"], a: 3 },
            { q: "14. На столе лежало 3 яблока. Вы взяли 2. Сколько у вас осталось?", o: ["1", "2", "3", "0"], a: 1 },
            { q: "15. Если 5 машин за 5 минут создают 5 деталей, за сколько минут 100 машин создадут 100 деталей?", o: ["100 минут", "20 минут", "5 минут", "50 минут"], a: 2 },
