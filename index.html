<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQ Test | Oson va Qiziqarli</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .card { background: white; max-width: 500px; margin: auto; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        button { background: #007bff; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; margin: 10px; }
        button:hover { background: #0056b3; }
        .hidden { display: none; }
        .option-btn { background: #e4e6eb; color: black; display: block; width: 100%; margin: 10px 0; }
        .option-btn:hover { background: #d8dadf; }
    </style>
</head>
<body>

<div class="card">
    <!-- Til tanlash sahifasi -->
    <div id="lang-screen">
        <h2>Tilingizni tanlang / Выберите язык</h2>
        <button onclick="startTest('uz')">O'zbekcha 🇺🇿</button>
        <button onclick="startTest('ru')">Русский 🇷🇺</button>
    </div>

    <!-- Test sahifasi -->
    <div id="quiz-screen" class="hidden">
        <h3 id="question-text">Savol</h3>
        <div id="options-container"></div>
    </div>

    <!-- Natija sahifasi -->
    <div id="result-screen" class="hidden">
        <h2 id="result-title">Natija</h2>
        <p id="result-text"></p>
        <button onclick="location.reload()">Qayta boshlash / Сначала</button>
    </div>
</div>

<script>
    const questions = {
        uz: [
            { q: "Daraxtda 5 ta qush qo'ngan edi. Ovchi bittasini urib tushirdi. Daraxtda nechta qush qoldi?", o: ["4 ta", "1 ta", "Hech qancha (uchib ketishdi)", "5 ta"], a: 2 },
            { q: "Marafonda ikkinchi o'rindagi yuguruvchini quvib o'tsangiz, siz nechanchi o'rinda bo'lasiz?", o: ["Birinchi", "Ikkinchi", "Uchinchi", "Oxirgi"], a: 1 },
            { q: "Qaysi oyda 28 kun bor?", o: ["Fevralda", "Faqat kabisa yilida", "Hamma oyda", "Hech qaysisida"], a: 2 }
        ],
        ru: [
            { q: "На дереве сидели 5 птиц. Охотник подстрелил одну. Сколько птиц осталось?", o: ["4", "1", "Ни одной (улетели)", "5"], a: 2 },
            { q: "Вы обгнали бегуна, идущего вторым. Какую позицию вы теперь занимаете?", o: ["Первую", "Вторую", "Третью", "Последнюю"], a: 1 },
            { q: "В каком месяце есть 28 дней?", o: ["В феврале", "Только в високосном", "Во всех месяцах", "Ни в одном"], a: 2 }
        ]
    };

    let currentLang = 'uz';
    let currentIdx = 0;
    let score = 0;

    function startTest(lang) {
        currentLang = lang;
        document.getElementById('lang-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const qList = questions[currentLang];
        if (currentIdx >= qList.length) {
            showResult();
            return;
        }
        const qData = qList[currentIdx];
        document.getElementById('question-text').innerText = qData.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        qData.o.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx);
            container.appendChild(btn);
        });
    }

    function checkAnswer(idx) {
        if (idx === questions[currentLang][currentIdx].a) score++;
        currentIdx++;
        showQuestion();
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        let iq = 70 + (score * 25); // Oddiygina hisoblash formulasi
        
        if (currentLang === 'uz') {
            document.getElementById('result-title').innerText = "Sizning Natijangiz!";
            document.getElementById('result-text').innerText = `To'g'ri javoblar: ${score} ta. Sizning taxminiy IQ darajangiz: ${iq}`;
        } else {
            document.getElementById('result-title').innerText = "Ваш Результат!";
            document.getElementById('result-text').innerText = `Правильных ответов: ${score}. Ваш примерный IQ: ${iq}`;
        }
    }
</script>
</body>
</html>
